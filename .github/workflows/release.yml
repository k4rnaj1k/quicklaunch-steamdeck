name: Build and Release

# Triggers:
#   - Push of a version tag (e.g. v1.0.0) → build + create GitHub Release
#   - Manual dispatch → build-only (useful for testing the workflow)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build plugin and publish release
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------- #
      # 1. Checkout                                                        #
      # ---------------------------------------------------------------- #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------- #
      # 2. Node / npm                                                      #
      # ---------------------------------------------------------------- #
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ---------------------------------------------------------------- #
      # 3. Lint / test                                                     #
      # ---------------------------------------------------------------- #
      - name: Run unit tests
        run: npm test -- --ci --coverage=false

      # ---------------------------------------------------------------- #
      # 4. Build frontend bundle                                           #
      # ---------------------------------------------------------------- #
      - name: Build plugin
        run: npm run build

      # ---------------------------------------------------------------- #
      # 5. Assemble release zip                                            #
      #                                                                    #
      # Decky expects exactly these files in the zip root:                 #
      #   dist/index.js   – compiled frontend bundle                       #
      #   plugin.json     – plugin metadata                                #
      #   main.py         – Python backend                                 #
      #   LICENSE         – required by the Decky plugin store             #
      # ---------------------------------------------------------------- #
      - name: Package plugin zip
        run: |
          PLUGIN_NAME="QuickLaunch"
          STAGING="staging/${PLUGIN_NAME}"

          mkdir -p "${STAGING}/dist"
          cp dist/index.js   "${STAGING}/dist/index.js"
          cp plugin.json     "${STAGING}/"
          cp main.py         "${STAGING}/"
          cp LICENSE         "${STAGING}/"

          cd staging
          zip -r "../${PLUGIN_NAME}.zip" "${PLUGIN_NAME}/"
          cd ..

          echo "Contents of ${PLUGIN_NAME}.zip:"
          unzip -l "${PLUGIN_NAME}.zip"

      # ---------------------------------------------------------------- #
      # 6. Upload artifact (available on every run, not just tag pushes)  #
      # ---------------------------------------------------------------- #
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickLaunch
          path: QuickLaunch.zip
          retention-days: 14

      # ---------------------------------------------------------------- #
      # 7. Create GitHub Release (tag pushes only)                        #
      # ---------------------------------------------------------------- #
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: QuickLaunch.zip
          generate_release_notes: true
          body: |
            ## QuickLaunch ${{ github.ref_name }}

            Install via [Decky Loader](https://decky.xyz/) plugin store, or
            download `QuickLaunch.zip` and extract it to
            `~/homebrew/plugins/QuickLaunch/` on your Steam Deck.

            See [TESTING.md](TESTING.md) for the manual on-device test plan.
